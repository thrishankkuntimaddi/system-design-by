<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5b8ef8"/>
      <stop offset="100%" style="stop-color:#7c6af5"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Graduation cap: flat brim (diamond/rhombus shape) -->
  <polygon points="32,14 54,24 32,34 10,24" fill="white" opacity="0.95"/>
  <!-- Cap top (the square part sitting on head) -->
  <rect x="24" y="30" width="16" height="12" rx="2" fill="white" opacity="0.85"/>
  <!-- Tassel string on right -->
  <line x1="54" y1="24" x2="54" y2="36" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
  <!-- Tassel ball -->
  <circle cx="54" cy="38" r="3" fill="white" opacity="0.9"/>
</svg>
